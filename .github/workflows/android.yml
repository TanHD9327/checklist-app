name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Bước này cực kỳ quan trọng để sửa lỗi "Requires Java 17"
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake scons libssl-dev libsqlite3-dev tk-dev libgdbm-dev libpcap-dev libexpat1-dev liblzma-dev libbz2-dev python3-pip python3-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 kivy==2.3.0 kivymd==1.2.0

      - name: Build with Buildozer
        run: |
          # Chạy buildozer, lệnh 'yes |' để tự động đồng ý các điều khoản SDK
          yes | buildozer android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: bin/*.apk